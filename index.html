<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .calculator-container {
            background: #ffffff;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #1f2937;
            margin-bottom: 20px;
        }
        label {
            font-weight: 600;
            margin-top: 15px;
            display: block;
            color: #4b5563;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        button {
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 15px;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .result {
            margin-top: 25px;
            padding: 15px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 6px;
            text-align: center;
            font-size: 18px;
            color: #1e3a8a;
            display: none;
        }
        .result span {
            font-weight: bold;
            font-size: 24px;
            display: block;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="calculator-container">
    <h2>Productivity Calculator</h2>
    
    <label for="output">Total Output (e.g., Units Produced, Revenue)</label>
    <input type="number" id="output" placeholder="Enter total output" required>
    
    <label for="input">Total Input (e.g., Hours Worked, Cost, Labor)</label>
    <input type="number" id="input" placeholder="Enter total input" required>
    
    <button onclick="calculateProductivity()">Calculate</button>
    
    <div id="resultBox" class="result">
        Your Productivity Ratio:
        <span id="productivityValue">0.00</span>
    </div>
</div>

<script>
    function calculateProductivity() {
        // Get values from input fields
        let output = parseFloat(document.getElementById('output').value);
        let input = parseFloat(document.getElementById('input').value);
        let resultBox = document.getElementById('resultBox');
        let resultValue = document.getElementById('productivityValue');

        // Validation
        if (isNaN(output) || isNaN(input)) {
            alert("Please enter valid numbers in both fields.");
            return;
        }
        if (input === 0) {
            alert("Total Input cannot be zero.");
            return;
        }

        // Calculate (Output / Input)
        let productivity = (output / input).toFixed(2);
        
        // Display Result
        resultValue.innerText = productivity;
        resultBox.style.display = "block";
    }
</script>

</body>
</html>
